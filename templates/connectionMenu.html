<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main class="main">
        <a href="/games/createGame" class="text link">Create</a>
        {{ range $index, $Title := .Title }}
        <section class="flex-block">
            <a href="/games/{{index $.Path $index}}" class="game-card">
                <h3 class="text text_title">{{$Title}}'s game</h3>
            </a>
        </section>
        {{ else }}
        <p class="text text_bold">No rows</p>
        {{ end }}
    </main>
</body>
</html>
